<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>आयुष आचार्य | मेरो डायरी</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@300;400;700&family=Plus+Jakarta+Sans:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05070a;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.07);
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --accent: #38bdf8;
            --gradient: linear-gradient(135deg, #38bdf8 0%, #818cf8 100%);
        }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at 50% -20%, #1e293b, #05070a);
            color: var(--text-primary);
            font-family: 'Noto Sans Devanagari', 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        .container {
            max-width: 850px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* --- NAVIGATION --- */
        nav {
            padding: 40px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            margin-bottom: 60px;
        }

        .logo {
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* --- HERO SECTION --- */
        .hero {
            margin-bottom: 80px;
            text-align: center;
        }

        .hero h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .hero p {
            color: var(--text-secondary);
            font-size: 1.2rem;
            max-width: 500px;
            margin: 0 auto;
        }

        /* --- BLOG GRID --- */
        .feed-grid {
            display: grid;
            gap: 30px;
        }

        .post-link {
            text-decoration: none;
            color: inherit;
        }

        .blog-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .blog-card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--gradient);
            opacity: 0;
            transition: opacity 0.4s;
            z-index: -1;
        }

        .blog-card:hover {
            transform: scale(1.02);
            border-color: var(--accent);
        }

        .post-date {
            font-size: 0.8rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
            margin-bottom: 15px;
            display: block;
        }

        .blog-card h2 {
            font-size: 1.8rem;
            margin: 0 0 15px 0;
            line-height: 1.3;
        }

        .blog-card p {
            color: var(--text-secondary);
            margin-bottom: 0;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        footer {
            text-align: center;
            padding: 100px 0 50px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <nav>
            <div class="logo">Ayush Acharya</div>
            <div class="nav-links">
                </div>
        </nav>

        <section class="hero">
            <h1>मेरो विचारहरू</h1>
            <p>अनुभव, भावना र शब्दहरूको एक सङ्गालो।</p>
        </section>

        <main class="feed-grid">
            <a href="post.html?name=post-1" class="post-link">
                <article class="blog-card">
                    <span class="post-date">श्रावण ३२, २०८१</span>
                    <h2>उ हरेक कुरा खुलेर व्यक्त गर्न सक्दैन</h2>
                    <p>जीवन रमाइलो छ। जीवन उल्लासमय छ। कसैको जीवन भरी पूर्ण छ कतिको दुःखदायी। कसैको शारीरिक, मानसिक रूपमा सबै ठीक छ...</p>
                </article>
            </a>

            </main>

        <footer>
            &copy; 2026 आयुष आचार्य | Built with logic.
        </footer>
    </div>

</body>
</html>
