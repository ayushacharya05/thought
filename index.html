<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>आयुष आचार्य | मेरो डायरी</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@300;400;700&family=Plus+Jakarta+Sans:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05070a;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.07);
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --accent: #38bdf8;
        }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at 50% -20%, #1e293b, #05070a);
            color: var(--text-primary);
            font-family: 'Noto Sans Devanagari', 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        .container { max-width: 800px; margin: 0 auto; padding: 0 20px; }

        nav { padding: 30px 0; border-bottom: 1px solid var(--border); margin-bottom: 60px; }
        .logo { font-size: 1.1rem; font-weight: 700; letter-spacing: 2px; color: var(--accent); text-transform: uppercase; }

        .hero { margin-bottom: 80px; text-align: center; padding: 40px 0; }
        .hero h1 { font-size: 3.5rem; margin: 0; font-weight: 700; }
        .hero p { color: var(--text-secondary); font-size: 1.2rem; margin-top: 10px; }

        #feed-grid { display: flex; flex-direction: column; gap: 25px; }

        .blog-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 40px;
            transition: all 0.3s ease;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .blog-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .post-date { color: var(--accent); font-size: 0.8rem; letter-spacing: 1px; margin-bottom: 12px; display: block; font-weight: 700; }
        h2 { margin: 0 0 12px 0; font-size: 1.9rem; line-height: 1.3; }
        p.excerpt { color: var(--text-secondary); margin: 0; font-size: 1.1rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        footer { text-align: center; padding: 100px 0 60px; color: var(--text-secondary); border-top: 1px solid var(--border); margin-top: 100px; }
    </style>
</head>
<body>

    <div class="container">
        <nav><div class="logo">AYUSH ACHARYA</div></nav>

        <section class="hero">
            <h1>मेरो डायरी</h1>
            <p>भावना र शब्दहरूको आधुनिक सङ्गालो।</p>
        </section>

        <main id="feed-grid">
            <p>लोड हुँदैछ...</p>
        </main>

        <footer>
            AYUSH ACHARYA &copy; 2026 | लेखिएका शब्दहरू कहिल्यै पुराना हुँदैनन्।
        </footer>
    </div>

    <script>
        async function fetchPosts() {
            const grid = document.getElementById('feed-grid');
            try {
                // Fetching the JSON database
                const response = await fetch('posts.json');
                if(!response.ok) throw new Error("JSON file not found");
                const posts = await response.json();
                
                grid.innerHTML = ''; 

                posts.forEach(post => {
                    grid.innerHTML += `
                        <a href="post.html?name=${post.id}" class="blog-card">
                            <span class="post-date">${post.date}</span>
                            <h2>${post.title}</h2>
                            <p class="excerpt">${post.excerpt}</p>
                        </a>
                    `;
                });
            } catch (e) {
                grid.innerHTML = `<p style="color: #ff4444;">Error loading posts: ${e.message}</p>`;
            }
        }
        fetchPosts();
    </script>
</body>
</html>
