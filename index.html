<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>मेरो डायरी</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f172a; --glass: rgba(255, 255, 255, 0.03); --border: rgba(255, 255, 255, 0.08); --text: #f1f5f9; --accent: #38bdf8; }
        body { background: var(--bg); color: var(--text); font-family: 'Noto Sans Devanagari', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; padding: 60px 20px; }
        header, .feed-container { max-width: 700px; width: 100%; }
        header h1 { color: var(--accent); font-size: 2.5rem; margin-bottom: 40px; }
        .post-link { text-decoration: none; color: inherit; display: block; margin-bottom: 20px; }
        .card { background: var(--glass); border: 1px solid var(--border); border-radius: 16px; padding: 25px; transition: 0.3s; }
        .post-link:hover .card { background: rgba(255, 255, 255, 0.06); transform: translateY(-3px); }
        .date { color: var(--accent); font-size: 0.85rem; display: block; margin-bottom: 5px; }
        h2 { margin: 0; font-size: 1.4rem; font-weight: 500; }
    </style>
</head>
<body>

    <header><h1>मेरो डायरी</h1></header>

    <main class="feed-container">
        <a href="post.html?name=post-1" class="post-link">
            <div class="card">
                <span class="date">श्रावण ३२, २०८१</span>
                <h2>उ हरेक कुरा खुलेर व्यक्त गर्न सक्दैन</h2>
            </div>
        </a>
    </main>

</body>
</html>
