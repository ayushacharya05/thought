<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>लेख पढ्नुहोस्</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #05070a; --text: #e2e8f0; --accent: #38bdf8; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Noto Sans Devanagari', sans-serif; margin: 0; line-height: 1.9; }
        .container { max-width: 700px; margin: 0 auto; padding: 60px 20px; }
        nav { margin-bottom: 40px; }
        .back-btn { text-decoration: none; color: var(--accent); font-weight: bold; }
        #post-content h1 { font-size: 2.5rem; color: #fff; }
        .meta { color: var(--accent); display: block; margin-bottom: 30px; font-style: italic; }
        p { margin-bottom: 25px; font-size: 1.2rem; }
        .error-msg { color: #ff4444; border: 1px solid #ff4444; padding: 20px; border-radius: 10px; background: rgba(255,0,0,0.1); }
    </style>
</head>
<body>

    <div class="container">
        <nav><a href="index.html" class="back-btn">← सबै लेखहरू</a></nav>
        <main id="post-content">
            <p>लोड हुँदैछ (Loading)...</p>
        </main>
    </div>

    <script>
        async function loadPost() {
            const urlParams = new URLSearchParams(window.location.search);
            const postName = urlParams.get('name');
            const container = document.getElementById('post-content');

            if (!postName) {
                container.innerHTML = "<div class='error-msg'>कुनै पनि लेख छानिएको छैन। (No post selected)</div>";
                return;
            }

            try {
                // IMPORTANT: Path must be exactly 'posts/filename.html'
                const response = await fetch('posts/' + postName + '.html');
                
                if (response.ok) {
                    const html = await response.text();
                    container.innerHTML = html;
                } else {
                    container.innerHTML = `
                        <div class='error-msg'>
                            <strong>लेख भेटिएन (404 Error)</strong><br>
                            जाँच गर्नुहोस्: के तपाइँको 'posts' फोल्डर भित्र <b>${postName}.html</b> फाइल छ?
                        </div>`;
                }
            } catch (error) {
                container.innerHTML = `
                    <div class='error-msg'>
                        <strong>सुरक्षा त्रुटि (Security Error)</strong><br>
                        यदि तपाइँ यो फाइल सिधै कम्प्युटरमा खोल्दै हुनुहुन्छ भने, केही ब्राउजरले यसलाई ब्लक गर्छन्। 
                        यसलाई <b>GitHub</b> मा अपलोड गरेपछि वा <b>VS Code Live Server</b> मा चलाउँदा यो ठिक हुन्छ।
                    </div>`;
            }
        }
        loadPost();
    </script>
</body>
</html>
