<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>लेख पढ्नुहोस्</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;700&family=Plus+Jakarta+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05070a;
            --text-main: #e2e8f0;
            --text-dim: #94a3b8;
            --accent: #38bdf8;
            --border: rgba(255, 255, 255, 0.07);
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Noto Sans Devanagari', sans-serif;
            margin: 0;
            line-height: 1.9;
        }

        /* Top Progress Indicator */
        .progress-bar {
            position: fixed;
            top: 0; left: 0; height: 3px;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            width: 100%;
            z-index: 100;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            padding: 80px 20px;
        }

        nav { margin-bottom: 60px; }

        .back-btn {
            text-decoration: none;
            color: var(--text-dim);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: color 0.3s;
        }

        .back-btn:hover { color: var(--accent); }

        /* Typography Styling */
        h1 {
            font-size: 2.8rem;
            line-height: 1.2;
            margin-bottom: 20px;
            color: #fff;
            font-weight: 700;
        }

        .meta {
            color: var(--accent);
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 0.9rem;
            margin-bottom: 50px;
            display: block;
            border-left: 2px solid var(--accent);
            padding-left: 15px;
        }

        #post-content p {
            font-size: 1.25rem;
            margin-bottom: 30px;
            color: rgba(255, 255, 255, 0.85);
            letter-spacing: 0.01rem;
        }

        footer {
            margin-top: 80px;
            padding-top: 40px;
            border-top: 1px solid var(--border);
            text-align: center;
            color: var(--text-dim);
        }
    </style>
</head>
<body>

    <div class="progress-bar"></div>

    <div class="container">
        <nav>
            <a href="index.html" class="back-btn">← सबै लेखहरू</a>
        </nav>

        <main id="post-content">
            <p>लोड हुँदैछ...</p>
        </main>

        <footer>
            &copy; 2026 आयुष आचार्य
        </footer>
    </div>

    <script>
        async function loadPost() {
            const urlParams = new URLSearchParams(window.location.search);
            const postName = urlParams.get('name');
            const container = document.getElementById('post-content');

            if (postName) {
                try {
                    const response = await fetch(`posts/${postName}.html`);
                    if (response.ok) {
                        const html = await response.text();
                        container.innerHTML = html;
                        // Set the page title to the blog title
                        const postTitle = container.querySelector('h1').innerText;
                        document.title = postTitle + " | मेरो डायरी";
                    } else {
                        container.innerHTML = "<h1>४०४</h1><p>लेख भेटिएन।</p>";
                    }
                } catch (error) {
                    container.innerHTML = "<p>त्रुटि भयो।</p>";
                }
            }
        }
        loadPost();
    </script>
</body>
</html>
